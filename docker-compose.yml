services:

  # ── One-time init: extract GTFS zip to backend data dir ─────────────────────
  gtfs-init:
    image: python:3-slim
    volumes:
      - ./:/workspace
    working_dir: /workspace
    command: python scripts/gtfs_extract.py
    restart: "no"

  # ── One-time init: build OSRM routing graphs (car / bike / foot) ─────────────
  # First run: ~15 min total (extract → partition → customize per profile).
  # Subsequent runs: instant (graphs already present in osrm-clm/{car,bike,foot}/).
  osrm-setup:
    image: osrm/osrm-backend:latest
    volumes:
      - ./osrm-clm:/data
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        for entry in "car:/opt/car.lua" "bike:/opt/bicycle.lua" "foot:/opt/foot.lua"; do
          profile=$$(echo "$$entry" | cut -d: -f1)
          lua=$$(echo "$$entry" | cut -d: -f2)
          if [ ! -f /data/$$profile/clm.osrm ]; then
            echo "=== Building OSRM graph for $$profile (~5 min) ==="
            mkdir -p /data/$$profile
            PBF=$$(ls /data/*.osm.pbf | head -1)
          cp "$$PBF" /data/$$profile/clm.osm.pbf
            osrm-extract -p $$lua /data/$$profile/clm.osm.pbf
            osrm-partition /data/$$profile/clm.osrm
            osrm-customize /data/$$profile/clm.osrm
            echo "=== Done: $$profile ==="
          else
            echo "=== $$profile already built, skipping ==="
          fi
        done
        echo "All OSRM graphs ready."
    restart: "no"

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    working_dir: /workspace/movilidad-urbana-sim/backend
    volumes:
      - ./:/workspace
    environment:
      OSRM_DRIVING_URL: http://osrm-car:5000
      OSRM_CYCLING_URL: http://osrm-bike:5000
      OSRM_FOOT_URL: http://osrm-foot:5000
      OTP_PLAN_URL: http://otp:8080/otp/routers/default/plan
      LPMC_MODEL_VARIANT: xgb
    ports:
      - "8000:8000"
    depends_on:
      gtfs-init:
        condition: service_completed_successfully
      osrm-car:
        condition: service_started
      osrm-bike:
        condition: service_started
      osrm-foot:
        condition: service_started
      otp:
        condition: service_started

  # ── Frontend (React + Vite) ──────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    working_dir: /workspace/movilidad-urbana-sim/frontend
    volumes:
      - ./:/workspace
      - /workspace/movilidad-urbana-sim/frontend/node_modules
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # ── OSRM routing engines ──────────────────────────────────────────────────────
  osrm-car:
    image: osrm/osrm-backend:latest
    command: osrm-routed --algorithm mld /data/clm.osrm
    volumes:
      - ./osrm-clm/car:/data
    ports:
      # Puerto host 5001 (no 5000): el 5000 lo ocupa AirPlay/Control Center en macOS.
      # El backend habla con OSRM por red interna (osrm-car:5000), ajeno a este mapeo.
      - "5001:5000"
    depends_on:
      osrm-setup:
        condition: service_completed_successfully

  osrm-bike:
    image: osrm/osrm-backend:latest
    command: osrm-routed --algorithm mld /data/clm.osrm
    volumes:
      - ./osrm-clm/bike:/data
    ports:
      - "5002:5000"
    depends_on:
      osrm-setup:
        condition: service_completed_successfully

  osrm-foot:
    image: osrm/osrm-backend:latest
    command: osrm-routed --algorithm mld /data/clm.osrm
    volumes:
      - ./osrm-clm/foot:/data
    ports:
      - "5003:5000"
    depends_on:
      osrm-setup:
        condition: service_completed_successfully

  # ── One-time init: build OTP graph from the GTFS feed if missing ─────────────
  # Idempotente: si otp-toledo/graph.obj ya existe (viene en el repo vía LFS),
  # se salta. Si falta, lo construye con --build --save a partir del feed GTFS
  # (GTFS_Urbano_Toledo_2026.zip) y clm.osm.pbf presentes en otp-toledo/.
  otp-build:
    image: opentripplanner/opentripplanner:2.5.0
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -f /var/opentripplanner/graph.obj ]; then
          echo "=== OTP graph already present, skipping build ===";
        else
          echo "=== Building OTP graph (~2 min) ===";
          JAVA_TOOL_OPTIONS=-Xmx4g /docker-entrypoint.sh --build --save;
        fi
    volumes:
      - ./otp-toledo:/var/opentripplanner
    restart: "no"

  # ── OpenTripPlanner (public transport routing) ────────────────────────────────
  otp:
    image: opentripplanner/opentripplanner:2.5.0
    command: --load --serve
    volumes:
      - ./otp-toledo:/var/opentripplanner
    ports:
      - "8080:8080"
    depends_on:
      otp-build:
        condition: service_completed_successfully
